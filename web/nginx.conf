server {
    listen 8200;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Cette ligne est la clé : elle tente de servir le fichier, 
        # ici si la page n est pas toruve il envoie sur index.html
        try_files $uri $uri/ /index.html;
    }

    # erreur server
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}